<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    title>ITP 322 - Secure Geocoding</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg-color: #f8fafc; --card-bg: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-color); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; filter: blur(4px); transition: filter 0.5s ease; }
        #map.unlocked { filter: blur(0); }
        
        /* Centered Auth Overlay */
        #authOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .auth-card { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 500px; background: var(--card-bg); padding: 8px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); display: none; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.3); }
        input { border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 15px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="margin-top:0">Restricted Access</h2>
            <p style="color:#64748b; font-size:14px">Please enter your ITP 322 Authentication Key to unlock the map.</p>
            <input type="password" id="userKey" placeholder="Enter Token...">
            <button onclick="unlockSystem()">Unlock Map</button>
        </div>
    </div>

    <div class="search-container" id="searchUI">
        <input type="text" id="addressInput" placeholder="Search a location...">
        <button id="searchBtn" onclick="handleSearch()">Search</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let USER_TOKEN = "";
        const map = L.map('map', { zoomControl: false }).setView([17.088, 120.982], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker;

        function unlockSystem() {
            const key = document.getElementById('userKey').value;
            if(!key) return alert("Key required");
            
            // Store the key provided by the user
            USER_TOKEN = key;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('map').classList.add('unlocked');
            document.getElementById('searchUI').style.display = 'flex';
        }

        async function handleSearch() {
            const btn = document.getElementById('searchBtn');
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            btn.innerText = "Searching...";
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/v1/geocode?address=${encodeURIComponent(address)}`, {
                    headers: { 'Authorization': `Bearer ${USER_TOKEN}` }
                });

                if (response.ok) {
                    const result = await response.json();
                    map.flyTo([result.data.lat, result.data.lng], 15);
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([result.data.lat, result.data.lng]).addTo(map).bindPopup(result.data.address).openPopup();
                } else {
                    alert("Unauthorized! The key you entered is incorrect.");
                    location.reload(); // Reset the app on failed auth
                }
            } catch (err) {
                alert("Backend server is not running.");
            } finally {
                btn.innerText = "Search";
            }
        }
    </script>
</body>
</html>
