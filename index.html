<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITP 322 - Advanced Geocoding</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color);
        }

        #map { height: 100vh; width: 100%; z-index: 1; }

        .search-container {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            width: 90%; max-width: 500px;
            background: var(--card-bg); padding: 8px;
            border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
        }

        .search-container input {
            flex: 1; border: none; padding: 12px 16px;
            font-size: 15px; outline: none; background: transparent;
        }

        .search-container button {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }

        .brand-badge {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: var(--card-bg); padding: 10px 15px; border-radius: 12px;
            font-size: 12px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="brand-badge">ITP 322 | Group 1 Geocoder</div>

    <div class="search-container">
        <input type="text" id="addressInput" placeholder="Enter a location (e.g. Baguio City)">
        <button id="searchBtn" onclick="handleSearch()">Search</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Start map at Bontoc
        const map = L.map('map', { zoomControl: false }).setView([17.088, 120.982], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let marker;

        async function handleSearch() {
            const btn = document.getElementById('searchBtn');
            const address = document.getElementById('addressInput').value;
            
            if (!address) return;

            btn.innerText = "Searching...";
            btn.disabled = true;

            try {
                // Ensure backend is running on port 8000
                const response = await fetch(`http://127.0.0.1:8000/api/v1/geocode?address=${encodeURIComponent(address)}`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': 'Bearer itp322_secret_token',
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    const { lat, lng, address: fullAddress } = result.data;

                    map.flyTo([lat, lng], 15, { duration: 1.5 });
                    
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<strong>Location Found:</strong><br>${fullAddress}`)
                        .openPopup();
                } else {
                    const error = await response.json();
                    alert("Error: " + (error.detail || "Location not found"));
                }
            } catch (err) {
                alert("Connection failed! Make sure your FastAPI backend is running.");
            } finally {
                btn.innerText = "Search";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
