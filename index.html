<!DOCTYPE html>
<html>
<head>
    <title>ITP 322 - Group 1 Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; border: 2px solid #333; margin-top: 15px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>Group 1: Geocoding System</h2>
        <input type="text" id="addressInput" placeholder="Search (e.g., Bontoc, Baguio)">
        <button onclick="handleSearch()">Search Location</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered on Bontoc (MPSU Campus area)
        const map = L.map('map').setView([17.088, 120.982], 13);

        // Add the Map Tiles (The actual images of the streets)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let marker;

        async function handleSearch() {
            const address = document.getElementById('addressInput').value;
            if (!address) return alert("Please enter an address");

            try {
                // Call your FastAPI Backend
                const response = await fetch(`http://127.0.0.1:8000/api/v1/geocode?address=${address}`, {
                    headers: { 'Authorization': 'Bearer itp322_secret_token' }
                });

                if (response.ok) {
                    const result = await response.json();
                    const { lat, lng, address: fullAddress } = result.data;

                    // Update Map View
                    map.setView([lat, lng], 15);
                    
                    // Remove old marker if it exists
                    if (marker) map.removeLayer(marker);
                    
                    // Add new marker
                    marker = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>Result:</b><br>${fullAddress}`)
                        .openPopup();
                } else if (response.status === 429) {
                    alert("Rate Limit Exceeded! Please wait a minute.");
                } else {
                    alert("Location not found or Unauthorized.");
                }
            } catch (err) {
                console.error(err);
                alert("Could not connect to FastAPI server. Is it running?");
            }
        }
    </script>
</body>
</html>
